<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Sign In — AidLedger</title>
  <meta name="description" content="AidLedger Authorized Vendor Portal — Sign in to process aid card payments." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <!-- Tailwind CSS (CDN — used by main app) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <style>
    /* ── Theme Variables ── */
    :root {
      --bg-slate-950: #020617;
      --bg-card: rgba(15, 23, 42, 0.95);
      --border-amber: rgba(245, 158, 11, 0.2);
      --text-slate-100: #f1f5f9;
      --text-slate-500: #64748b;
    }
    html.light {
      --bg-slate-950: #f8fafc;
      --bg-card: #ffffff;
      --border-amber: rgba(245, 158, 11, 0.4);
      --text-slate-100: #0f172a;
      --text-slate-500: #475569;
    }

    body { background-color: var(--bg-slate-950); transition: background-color 0.3s; color: var(--text-slate-100); }
    .glass-card {
      background: var(--bg-card);
      border: 1px solid var(--border-amber);
      border-radius: 24px;
      box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.25);
    }
    .input-wrapper {
      background: rgba(2, 6, 23, 0.4);
      border: 1px solid rgba(71, 85, 105, 0.3);
      transition: all 0.2s;
    }
    html.light .input-wrapper {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
    }
    .input-wrapper:focus-within { border-color: #f59e0b; box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2); }
    
    .form-input {
      background: transparent !important;
      border: none !important;
      color: var(--text-slate-100);
      width: 100%;
      outline: none;
      font-size: 0.875rem;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  {# Theme Toggle (Absolute) #}
  <div class="absolute top-6 right-6">
    <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-slate-500/10 text-slate-500 transition-colors">
      <svg id="theme-sun" class="w-5 h-5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg id="theme-moon" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>

  <div class="w-full max-w-md">
    <div class="glass-card p-8 sm:p-10">
      {# Brand #}
      <div class="flex flex-col items-center mb-8">
        <div class="w-12 h-12 rounded-2xl bg-amber-500/15 border border-amber-500/30 flex items-center justify-center mb-4">
          <svg class="w-6 h-6 text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
        </div>
        <h1 class="text-2xl font-extrabold text-center tracking-tight">
          <span class="text-amber-500">Aid</span>Ledger <span class="text-slate-500 font-normal">/ Vendor</span>
        </h1>
        <p class="text-slate-500 text-xs mt-2 uppercase tracking-widest font-semibold">Merchant Portal</p>
      </div>

      {% if error %}
      <div class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 flex items-start gap-3">
        <svg class="w-5 h-5 text-red-500 shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p class="text-xs text-red-400 font-medium leading-relaxed">{{ error }}</p>
      </div>
      {% endif %}

      <form action="/vendor/login" method="POST" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        
        <div>
          <label for="username" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 ml-1">Vendor Username</label>
          <div class="input-wrapper px-4 py-3 rounded-xl">
            <input
              type="text"
              id="username"
              name="username"
              required
              class="form-input"
              placeholder="e.g. ahmed_grocery"
            />
          </div>
        </div>

        <div>
          <label for="password" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 ml-1">Secret Password</label>
          <div class="input-wrapper px-4 py-3 rounded-xl relative">
            <input
              type="password"
              id="password"
              name="password"
              required
              class="form-input pr-10"
              placeholder="••••••••"
            />
            <button type="button" onclick="togglePw()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-amber-500">
              <svg id="eye-icon" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button
          type="submit"
          class="w-full py-4 rounded-xl bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold text-sm transition-all shadow-lg shadow-amber-500/20 mt-4 active:scale-95"
        >
          Sign In to Vendor Portal
        </button>
      </form>

      <div class="mt-10 pt-8 border-t border-slate-800/40 text-center">
        <p class="text-[10px] text-slate-600 uppercase tracking-tighter">
          Government of Pakistan — Aid Ledger Network
        </p>
      </div>
    </div>
  </div>

  <script>
    function togglePw() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    function toggleTheme() {
      const html = document.documentElement;
      html.classList.toggle('light');
      const sun = document.getElementById('theme-sun');
      const moon = document.getElementById('theme-moon');
      
      if (html.classList.contains('light')) {
        sun.classList.remove('hidden');
        moon.classList.add('hidden');
        localStorage.setItem('vendor-theme', 'light');
      } else {
        sun.classList.add('hidden');
        moon.classList.remove('hidden');
        localStorage.setItem('vendor-theme', 'dark');
      }
    }

    if (localStorage.getItem('vendor-theme') === 'light') {
      document.documentElement.classList.add('light');
      document.getElementById('theme-sun').classList.remove('hidden');
      document.getElementById('theme-moon').classList.add('hidden');
    }
  </script>
</body>
</html>
