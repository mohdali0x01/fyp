{# vendor/partials/error.html — Shown when any step fails #}
<div class="space-y-4">
  <div class="p-4 rounded-xl bg-red-500/10 border border-red-500/30 flex items-start gap-3">
    <svg class="w-5 h-5 text-red-400 shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    <div>
      <p class="font-semibold text-red-400 text-sm">Transaction Failed</p>
      <p class="text-xs text-slate-400 mt-1">{{ error_message }}</p>
    </div>
  </div>

  <button
    onclick="location.reload()"
    class="w-full py-2.5 rounded-xl border border-slate-700 text-slate-400 hover:text-slate-200 hover:border-slate-600 text-sm transition-all flex items-center justify-center gap-2"
  >
    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Try Again
  </button>
</div>
